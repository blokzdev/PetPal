name: ci

on:
  push:
    branches: [main, "claude/**"]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  flutter:
    name: analyze + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.41.7
          cache: true

      - name: flutter pub get
        run: flutter pub get

      - name: flutter analyze
        run: flutter analyze --fatal-infos

      - name: flutter test
        run: flutter test --reporter expanded

  release-apk:
    name: release APK (split per ABI)
    # Cost-controlled trigger (DECISIONS row 23):
    # - workflow_dispatch (manual, including from GitHub mobile)
    # - push to main only — `claude/**` working branches don't burn
    #   minutes on every commit; the developer triggers manually when
    #   they need an installable build.
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'push' && github.ref == 'refs/heads/main')
    needs: flutter
    runs-on: ubuntu-latest
    # actions: write is needed by the prune step below to delete prior
    # artifacts. contents: read covers actions/checkout.
    permissions:
      contents: read
      actions: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.41.7
          cache: true

      - name: flutter pub get
        run: flutter pub get

      # ARM-only split: target-platform restricts to the two ABIs that
      # cover physical Android phones. x86_64 (emulator-only) is dropped
      # to halve build time and artifact storage — see DECISIONS row 23.
      # Release signing falls back to the debug keystore until Phase 6
      # generates a real upload keystore (DECISIONS row 22).
      - name: flutter build apk --release --split-per-abi (arm64 + arm32 only)
        run: |
          flutter build apk \
            --release \
            --target-platform android-arm,android-arm64 \
            --split-per-abi

      - name: Stage APKs with friendly filenames
        run: |
          cd build/app/outputs/flutter-apk
          mv app-arm64-v8a-release.apk petpal-release-arm64-v8a.apk
          mv app-armeabi-v7a-release.apk petpal-release-armeabi-v7a.apk
          ls -la *.apk

      # Keep-only-latest (DECISIONS row 24): delete prior artifacts with
      # the same names so each new run replaces the old build instead of
      # accumulating. Runs after the build succeeds so a failed build
      # leaves the previous APK intact for the user. retention-days on
      # the uploads below is a safety net in case this prune step ever
      # silently no-ops.
      - name: Prune previous APK artifacts (keep-only-latest)
        uses: actions/github-script@v7
        with:
          script: |
            const targetNames = new Set([
              'petpal-release-arm64-v8a',
              'petpal-release-armeabi-v7a',
            ]);
            const iter = github.paginate.iterator(
              github.rest.actions.listArtifactsForRepo,
              {
                owner: context.repo.owner,
                repo: context.repo.repo,
                per_page: 100,
              },
            );
            let deleted = 0;
            for await (const page of iter) {
              for (const artifact of page.data) {
                if (!targetNames.has(artifact.name)) continue;
                if (artifact.expired) continue;
                core.info(
                  `deleting artifact #${artifact.id} ` +
                  `(${artifact.name}, ${artifact.size_in_bytes} bytes)`
                );
                await github.rest.actions.deleteArtifact({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  artifact_id: artifact.id,
                });
                deleted += 1;
              }
            }
            core.info(`pruned ${deleted} previous APK artifact(s)`);

      - name: Upload arm64-v8a APK (most modern phones)
        uses: actions/upload-artifact@v4
        with:
          name: petpal-release-arm64-v8a
          path: build/app/outputs/flutter-apk/petpal-release-arm64-v8a.apk
          retention-days: 2
          if-no-files-found: error

      - name: Upload armeabi-v7a APK (older 32-bit ARM phones)
        uses: actions/upload-artifact@v4
        with:
          name: petpal-release-armeabi-v7a
          path: build/app/outputs/flutter-apk/petpal-release-armeabi-v7a.apk
          retention-days: 2
          if-no-files-found: error
