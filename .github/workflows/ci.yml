name: ci

on:
  push:
    branches: [main, "claude/**"]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  flutter:
    name: analyze + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.41.7
          cache: true

      - name: flutter pub get
        run: flutter pub get

      - name: flutter analyze
        run: flutter analyze --fatal-infos

      - name: flutter test
        run: flutter test --reporter expanded

  release-apk:
    name: release APK (split per ABI)
    # Skip on PRs — APK artifacts on PRs are noisy and burn CI minutes.
    # Push to main / claude/** + manual dispatch produce installable
    # builds for on-device verification (DECISIONS row 21).
    if: github.event_name != 'pull_request'
    needs: flutter
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.41.7
          cache: true

      - name: flutter pub get
        run: flutter pub get

      # Release signing falls back to the debug keystore when
      # android/key.properties is absent (DECISIONS row 22). Phase 6
      # generates the real upload keystore.
      - name: flutter build apk --release --split-per-abi
        run: flutter build apk --release --split-per-abi

      - name: Stage APKs with friendly filenames
        run: |
          cd build/app/outputs/flutter-apk
          mv app-arm64-v8a-release.apk petpal-release-arm64-v8a.apk
          mv app-armeabi-v7a-release.apk petpal-release-armeabi-v7a.apk
          mv app-x86_64-release.apk petpal-release-x86_64.apk
          ls -la *.apk

      - name: Upload arm64-v8a APK (most modern phones)
        uses: actions/upload-artifact@v4
        with:
          name: petpal-release-arm64-v8a
          path: build/app/outputs/flutter-apk/petpal-release-arm64-v8a.apk
          retention-days: 7
          if-no-files-found: error

      - name: Upload armeabi-v7a APK (older 32-bit ARM phones)
        uses: actions/upload-artifact@v4
        with:
          name: petpal-release-armeabi-v7a
          path: build/app/outputs/flutter-apk/petpal-release-armeabi-v7a.apk
          retention-days: 7
          if-no-files-found: error

      - name: Upload x86_64 APK (most Android emulators)
        uses: actions/upload-artifact@v4
        with:
          name: petpal-release-x86_64
          path: build/app/outputs/flutter-apk/petpal-release-x86_64.apk
          retention-days: 7
          if-no-files-found: error
