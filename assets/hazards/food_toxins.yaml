# Phase 8.3 food-toxin list. Owner-auditable per DECISIONS row 100.
#
# Adding or editing entries here REQUIRES updating
# test/harness/guardrails/food_hazards_fixture.dart in the same commit
# (≥10 positive phrasings per category, mirroring DECISIONS row 29's
# coverage rule for the symptom screener). The fixture-walk test in
# food_hazards_fixture_test.dart enforces this floor on every CI run.
#
# Match semantics:
#   - Phrases are matched case-insensitively, word-bounded.
#   - The screener compiles each phrase to RegExp.escape + \b…\b,
#     so authors write plain English; reviewers don't need to know
#     regex (DECISIONS row 107).
#
# Category order matters — first-match-wins iteration. More-specific
# / more-acute categories are listed first so cross-category
# phrasings (e.g. "pot brownie" matches both chocolate's "brownie"
# AND cannabis's "pot brownie") flag the more useful category.
# Specific-before-general ordering: xylitol, cannabis, macadamia,
# grapes_raisins are listed before chocolate / alliums / alcohol /
# caffeine / yeast_dough.
#
# Inclusion bar: known acute toxicity to dogs and/or cats, anchored to
# ASPCA / Pet Poison Helpline canonical lists. v1 excludes:
#   - salt-excessive (subjective; extractor's plain-English Rule 5
#     produces "salt", not "excessive salt")
#   - avocado (less acute for dogs/cats than parrots / large animals)
#   - nuts-general (too broad — specific tree nuts handled per-entry)
# Expand only with matching fixtures.

categories:
  - id: xylitol
    species: [dog, cat]
    ai_summary: "Xylitol (sugar substitute — causes acute hypoglycemia in dogs)"
    phrases:
      - xylitol
      - birch sugar
      - sugar-free gum
      - sugarfree gum
      - sugar-free mint
      - sugar-free mints
      - sugar-free candy
      - sugarfree candy
      - sugarless gum
      - sugar free candy

  - id: cannabis
    species: [dog, cat]
    ai_summary: "Cannabis (THC toxicity)"
    phrases:
      - marijuana
      - cannabis
      - weed
      - thc
      - edible
      - edibles
      - pot brownie
      - pot brownies
      - cannabis gummy
      - cannabis gummies
      - thc gummy
      - thc gummies
      - cbd gummy

  - id: macadamia
