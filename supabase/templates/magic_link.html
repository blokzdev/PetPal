<!doctype html>
<html>
  <body style="font-family: system-ui, -apple-system, sans-serif; max-width: 480px; margin: 40px auto; padding: 0 20px; color: #2D3436;">
    <h1 style="font-size: 22px; font-weight: 600; margin-bottom: 8px;">Sign in to PetPal</h1>
    <p style="font-size: 16px; line-height: 1.5; margin: 0 0 24px 0;">
      Tap below to sign in. The link works once and expires in 60 minutes.
    </p>
    <p style="margin: 32px 0;">
      <a href="{{ .ConfirmationURL }}"
         style="background: #5C8A7A; color: #F7F5F2; padding: 12px 24px; text-decoration: none; border-radius: 8px; font-weight: 600; display: inline-block;">
        Sign in to PetPal
      </a>
    </p>
    <p style="font-size: 13px; color: #2D3436; opacity: 0.6; line-height: 1.5;">
      If you didn't ask for this, you can ignore this email — no one can use the link without it.
    </p>
  </body>
</html>
