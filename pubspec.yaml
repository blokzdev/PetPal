name: petpal
description: "PetPal — a per-pet memory agent for pet owners."
# The following line prevents the package from being accidentally published to
# pub.dev using `flutter pub publish`. This is preferred for private packages.
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

# The following defines the version and build number for your application.
# A version number is three numbers separated by dots, like 1.2.43
# followed by an optional build number separated by a +.
# Both the version and the builder number may be overridden in flutter
# build by specifying --build-name and --build-number, respectively.
# In Android, build-name is used as versionName while build-number used as versionCode.
# Read more about Android versioning at https://developer.android.com/studio/publish/versioning
# In iOS, build-name is used as CFBundleShortVersionString while build-number is used as CFBundleVersion.
# Read more about iOS versioning at
# https://developer.apple.com/library/archive/documentation/General/Reference/InfoPlistKeyReference/Articles/CoreFoundationKeys.html
# In Windows, build-name is used as the major, minor, and patch parts
# of the product and file versions while build-number is used as the build suffix.
version: 1.0.0+1

environment:
  sdk: ^3.11.5

# Dependencies specify other packages that your package needs in order to work.
# To automatically upgrade your package dependencies to the latest versions
# consider running `flutter pub upgrade --major-versions`. Alternatively,
# dependencies can be manually updated by changing the version numbers below to
# the latest version available on pub.dev. To see which dependencies have newer
# versions available, run `flutter pub outdated`.
dependencies:
  flutter:
    sdk: flutter

  # The following adds the Cupertino Icons font to your application.
  # Use with the CupertinoIcons class for iOS style icons.
  cupertino_icons: ^1.0.8
  drift: ^2.32.1
  path_provider: ^2.1.5
  flutter_riverpod: ^3.3.1
  go_router: ^17.2.2
  flutter_secure_storage: ^10.0.0
  sqlite3: ^3.3.1
  crypto: ^3.0.7
  http: ^1.6.0
  flutter_onnxruntime: ^1.7.0
  dart_wordpiece: ^1.2.0
  yaml: ^3.1.3
  archive: ^4.0.9
  share_plus: ^12.0.2
  shared_preferences: ^2.5.5
  # Phase 4 scheduling stack (DECISIONS rows 28, 30):
  # - notifications: surfaces notification reminders + post-fire
  #   announcements for synthesisNotify mode.
  # - exact-time alarms: AlarmManager wakes the app for `notification`
  #   mode reminders even while the app is killed.
  # - background work: WorkManager runs script + synthesis tasks
  #   condition-gated (battery, network).
  # - permission_handler: battery-optimisation exemption prompt
  #   (task 4.7) and Android 13+ POST_NOTIFICATIONS runtime grant.
  flutter_local_notifications: ^17.2.4
  android_alarm_manager_plus: ^4.0.7
  workmanager: ^0.9.0+3
  permission_handler: ^11.3.1
  # Phase 5.6 — Feel Polish foundation (DECISIONS row 50). The
  # existing PetPalColors hex values stay pinned via the manual
  # surface overrides in colors.dart; FlexColorScheme improves
  # derived containers / on-tones / fixed pairs and dark-mode
  # sophistication beyond ColorScheme.fromSeed defaults.
  # Flutter Favorite, 160/160 pub points, rydmike (verified).
  flex_color_scheme: ^8.4.0
  # Phase 5.6 Commit B — icon migration. Phosphor regular weight
  # matches PetPal's warm-journal brand register. Three locked
  # refinements vs default regular swap (DECISIONS row 50):
  # warningOctagon for medical red-flag escalation badge, bookOpen
  # for journal context, and `key` (not keySlash — keySlash absent
  # from v2.1.0; user-confirmed substitution paired with the chat
  # error banner's existing error tint). Phosphor's IconData
  # instances are equality-stable so existing find.byIcon test
  # patterns keep working. 23-month staleness flagged in row 50;
  # static-icon-font wrapper, low surface for breakage.
  phosphor_flutter: ^2.1.0
  # Phase 5.6 Commit C — motion-layer.
  # - flutter_animate: replaces manual AnimationController +
  #   TweenSequence at JournalBloom; declarative chains everywhere
  #   else hero motion adopts. gskinner (verified), API matured.
  # - animations: Google's official Material motion package.
  #   SharedAxisTransition on /wiki/entry to convey "drilling
  #   deeper into the same content"; other routes stay on the
  #   PredictiveBackPageTransitionsBuilder default for system
  #   back-gesture support. flutter.dev (verified).
  flutter_animate: ^4.5.2
  animations: ^2.2.0
  # Pre-Phase-6 polish — markdown rendering on detail screens.
  # `flutter_markdown` was discontinued by Google (May 2024); the
  # official continuation is `flutter_markdown_plus` by Foresight
  # Mobile (verified, 160/160 pub points, 246k downloads, defaults
  # to GitHub-flavored markdown). Same API surface as the
  # discontinued original, so the integration is a clean swap.
  # Used by wiki_entry_screen for journal entry + weekly summary
  # detail rendering — pre-fix the screens rendered raw markdown
  # source via SelectableText/monospace.
  flutter_markdown_plus: ^1.0.7
  # Phase 6 task 6.2 — pet profile photo + 6.6 camera-as-memory.
  # Official Flutter team package, 160/160 pub points, 2.52M weekly
  # downloads. On Android 13+ the gallery picker uses the Android
  # Photo Picker API and requires no manifest changes / permissions
  # (DECISIONS row 54). Camera mode (6.6) needs CAMERA permission +
  # the manifest changes from the plugin-bump checklist; landed
  # there. v1 stays gallery-only via image_picker.pickImage(source:
  # ImageSource.gallery) for 6.2 to keep 6.2 small.
  image_picker: ^1.2.2
  # Phase 6 task 6.12 — fl_chart for weight time-series + symptom-
  # frequency charts on the SOUL profile. Pure-Dart Canvas-based,
  # no native plugin, no manifest changes (DECISIONS row 56). Only
  # the chart primitives (LineChart, BarChart) are used; the package
  # is heavy enough that a leaner alternative was considered, but
  # fl_chart is the de facto Flutter charting library (4.5M weekly
  # downloads, 130+ pub points) and the stylistic flexibility maps
  # cleanly onto the warm-modern palette without theme overrides.
  fl_chart: ^1.1.1
  in_app_purchase: ^3.2.3
  collection: ^1.19.1
  # Phase 7 task G.2 — E2EE wiki sync (DECISIONS rows 71 + 83).
  # `cryptography` provides Argon2id (passphrase → key derivation
  # with the m=64MB, t=3, p=4 starting params from row 71) and
  # AES-GCM-256 (the body cipher per row 83's object shape).
  # Pure-Dart, no native plugin manifest changes — verified
  # against the plugin-bump checklist (row 33 N/A; pure Dart).
  # 160/160 pub points, dint package, well-maintained.
  cryptography: ^2.7.0
  # Phase 7 task H.1.a — Supabase client adoption (DECISIONS rows 69 +
  # 70 + 82). Brings magic-link auth (`signInWithOtp`), the production
  # SupabaseSyncBackend wiring (H.1.b), and the SDK auth-state stream
  # that the AuthSessionNotifier subscribes to. `supabase_flutter`
  # bundles `app_links` for the magic-link return deep-link
  # (`petpal://login-callback`); the matching intent filter lives in
  # `android/app/src/main/AndroidManifest.xml` and is asserted by
  # `test/platform/android_manifest_test.dart` per the row-33
  # plugin-bump checklist. Initialization happens in `main()` only
  # when `--dart-define`'d `SUPABASE_URL` + `SUPABASE_ANON_KEY` are
  # present; absent those, the app stays on the BYOK / sign-in-coming
  # path documented in `docs/SETUP.md`.
  supabase_flutter: ^2.12.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter

  # The "flutter_lints" package below contains a set of recommended lints to
  # encourage good coding practices. The lint set provided by the package is
  # activated in the `analysis_options.yaml` file located at the root of your
  # package. See that file for information about deactivating specific lint
  # rules and activating additional ones.
  flutter_lints: ^6.0.0
  drift_dev: ^2.32.1
  build_runner: ^2.14.1
  # Phase 5 task 5.3 — adaptive launcher icon generation. Reads the
  # `flutter_launcher_icons:` block at the bottom of this file and
  # writes per-density `mipmap-*/ic_launcher.png` plus the
  # `mipmap-anydpi-v26/ic_launcher.xml` adaptive icon descriptor.
  # Run with: `dart run flutter_launcher_icons`. Source assets are
  # produced by `tools/generate_icon.py` and live under
  # `assets/branding/`.
  flutter_launcher_icons: ^0.14.4
  # Phase 5 task 5.4 — splash screen generation. Reads the
  # `flutter_native_splash:` block at the bottom of this file and
  # writes the per-density splash assets, drawables, and
  # styles.xml/values-night/styles.xml entries. Run with:
  # `dart run flutter_native_splash:create`.
  flutter_native_splash: ^2.4.6

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter packages.
flutter:

  # The following line ensures that the Material Icons font is
  # included with your application, so that you can use the icons in
  # the material Icons class.
  uses-material-design: true

  assets:
    # Snowflake arctic-embed-xs INT8 ONNX model + WordPiece vocab.
    # ~23 MB committed; bundled into the APK so embeddings run fully
    # on-device, no network. See DECISIONS row 20.
    - assets/models/arctic-embed-xs/
    # Per-category SOUL.md seed templates (Phase 3 task 3.4 + 5.5.1
    # rename). Picked by the add-pet flow from the category dropdown.
    - assets/onboarding/
    # Phase 5.5 task 5.5.2 — curated species lists per category.
    # Hand-coded ~600+ entries across 8 JSON files (one per category).
    # Schema per row: {display_name, scientific_name, category,
    # inat_taxon_id, common_alternatives, wild_or_domestic}. Loaded
    # lazily by the searchable picker (5.5.3). DECISIONS rows 42 + 43.
    - assets/species/
    # Bundled launch skill packs (Phase 3 task 3.5). AssetSkillSource
    # discovers each skill via AssetManifest; each skill is a
    # subdirectory under assets/skills/<id>/ containing manifest.md
    # and the fragment files listed in its `loads:`.
    - assets/skills/puppy/
    - assets/skills/senior-dog/
    - assets/skills/new-cat/
    - assets/skills/reactive-dog/
    - assets/skills/senior-cat/
    - assets/skills/multi-cat/
    # Phase 4 reminder notification templates (task 4.8). One YAML
    # per canonical kind: flea_treatment, heartworm_dose, vaccine_due,
    # weight_check. Each declares `title:` and `body:`; body may
    # interpolate {pet_name}.
    - assets/reminders/
    # Phase 5 task 5.1 — bundled variable fonts (DECISIONS row 38):
    # Inter (UI body) + Source Serif 4 (journal accent). Bundled
    # rather than runtime-fetched via google_fonts so first launch
    # is visually correct offline, consistent with the offline-first
    # embeddings stack (DECISIONS row 20). SIL OFL license files
    # ship alongside.
    - assets/fonts/
    # Phase 5 task 5.6 — onboarding welcome screen renders the
    # journal-+-paw foreground PNG above the tagline. Same source
    # asset that flutter_launcher_icons + flutter_native_splash
    # consume; ships once, serves three callsites.
    - assets/branding/

  # Custom fonts. Both families ship as variable TTFs covering every
  # weight from Thin (100) through Black (900); weight selection at
  # runtime uses TextStyle.fontVariations (`wght` axis) — see
  # lib/app/design/typography.dart. The static `weight:` slots below
  # exist so platform components that read fontWeight from the theme
  # still resolve to a registered slot; the variable axis renders the
  # actual rendered weight.
  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-VariableFont.ttf
        - asset: assets/fonts/Inter-Italic-VariableFont.ttf
          style: italic
    - family: SourceSerif4
      fonts:
        - asset: assets/fonts/SourceSerif4-VariableFont.ttf
        - asset: assets/fonts/SourceSerif4-Italic-VariableFont.ttf
          style: italic

  # An image asset can refer to one or more resolution-specific "variants", see
  # https://flutter.dev/to/resolution-aware-images

  # For details regarding adding assets from package dependencies, see
  # https://flutter.dev/to/asset-from-package

  # To add custom fonts to your application, add a fonts section here,
  # in this "flutter" section. Each entry in this list should have a
  # "family" key with the font family name, and a "fonts" key with a
  # list giving the asset and other descriptors for the font. For
  # example:
  # fonts:
  #   - family: Schyler
  #     fonts:
  #       - asset: fonts/Schyler-Regular.ttf
  #       - asset: fonts/Schyler-Italic.ttf
  #         style: italic
  #   - family: Trajan Pro
  #     fonts:
  #       - asset: fonts/TrajanPro.ttf
  #       - asset: fonts/TrajanPro_Bold.ttf
  #         weight: 700
  #
  # For details regarding fonts from package dependencies,
  # see https://flutter.dev/to/font-from-package

# Phase 5 task 5.3 — adaptive launcher icon configuration.
# Source assets are emitted by `python3 tools/generate_icon.py` into
# assets/branding/. To regenerate platform icons after editing the
# generator, run:
#
#   python3 tools/generate_icon.py
#   dart run flutter_launcher_icons
#
# Generated outputs live under android/app/src/main/res/mipmap-*/.
# DECISIONS row 35 locks the visual direction (warm off-white
# background `#F7F5F2`, graphite `#2D3436` foreground); row 38
# follow-up locks the medium stroke weight + open-journal-with-paw
# composition.
flutter_launcher_icons:
  android: true
  ios: false
  # Legacy non-adaptive icon (Android 7.x — pre-API-26). Composited
  # PNG with the warm off-white background baked in so the mark
  # reads correctly on launchers that don't honour adaptive XML.
  image_path: "assets/branding/icon-legacy.png"
  # Adaptive icon (Android 8.0+). Foreground is the transparent-bg
  # journal-+-paw mark; background is the warm off-white tile,
  # supplied as a hex color so we don't need a separate background
  # asset.
  adaptive_icon_foreground: "assets/branding/icon-foreground.png"
  adaptive_icon_background: "#F7F5F2"
  min_sdk_android: 24

# Phase 5 task 5.4 — splash screen.
# Honest-dark-mirror treatment per the user's choice in the task 5.4
# design questions: light splash uses the warm off-white background
# (`#F7F5F2`) with the graphite mark; dark splash uses the warm
# graphite background (`#1F1E1C`, matching darkSurfaceLow from the
# Phase 5 token palette) with a warm-off-white version of the same
# mark. The dark mark asset is generated by tools/generate_icon.py.
#
# Regenerate platform splash assets with:
#   dart run flutter_native_splash:create
#
# The `android_12` block configures the Android 12+ system splash
# (which masks the icon to a circle and sizes it to ~108dp). The
# generated `splash` config covers Android 11 and below via the
# legacy `launch_background.xml` window-background drawable.
flutter_native_splash:
  color: "#F7F5F2"
  image: assets/branding/icon-foreground.png
  color_dark: "#1F1E1C"
  image_dark: assets/branding/icon-foreground-dark.png
  android: true
  ios: false
  web: false
  android_12:
    image: assets/branding/icon-foreground.png
    icon_background_color: "#F7F5F2"
    image_dark: assets/branding/icon-foreground-dark.png
    icon_background_color_dark: "#1F1E1C"
